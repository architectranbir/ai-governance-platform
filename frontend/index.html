<!DOCTYPE html>
<html>
<head>
  <title>Engineering Standards Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 40px; }
    .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; }
    textarea { width: 100%; height: 110px; padding: 12px; font-size: 16px; }
    button { margin-top: 12px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .answer { margin-top: 20px; padding: 15px; background: #eef3ff; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Engineering Standards Chatbot</h1>
    <p>Ask a question about enterprise engineering standards.</p>
    <textarea id="question" placeholder="Example: What are engineering standards?"></textarea>
    <br />
    <button onclick="askQuestion()">Ask</button>
    <div id="answer" class="answer"></div>
  </div>

  <script>
    async function askQuestion() {
      const question = document.getElementById("question").value;
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ question })
      });
      const data = await response.json();
      document.getElementById("answer").innerText = data.answer;
    }
  </script>
</body>
</html>
